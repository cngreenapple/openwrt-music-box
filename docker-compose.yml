services:
  openwrt-music-box:
    build:
      context: .
      # Gunakan network host agar build container bisa resolve DNS via host
      # (Di OpenWrt, build container default menggunakan bridge network yang tidak bisa resolve DNS)
      network: host
    container_name: openwrt-music-box
    restart: unless-stopped
    network_mode: host
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - /dev/snd:/dev/snd
      - /var/run/dbus:/var/run/dbus
      - /mnt:/mnt:ro
      - ./data:/app/data
    environment:
      - OWMB_PORT=${OWMB_PORT:-5000}
      - OWMB_HOST=${OWMB_HOST:-0.0.0.0}
      - OWMB_DB_PATH=/app/data/music.db
      - OWMB_LOG_LEVEL=${OWMB_LOG_LEVEL:-INFO}
      - OWMB_DEFAULT_PATH=${OWMB_DEFAULT_PATH:-/root/music}
    devices:
      - /dev/snd
    cap_add:
      - SYS_RAWIO
      - NET_ADMIN
    stdin_open: true
    tty: true