<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OwrtBox</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="apple-touch-icon" href="/static/img/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="/static/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <link rel="shortcut icon" href="/static/img/favicon.ico">
</head>
<body>
<audio id="browser-audio" preload="auto"></audio>
<div class="bg-layer"></div>

<div class="player-card">
    <!-- Header -->
    <div class="header">
        <span class="brand" onclick="toggleTheme()">OwrtBox</span>
        <div class="header-right">
            <div class="mode-toggle" onclick="togglePlayMode()">
                <span id="mode-device" class="active"><i class="fa-solid fa-server"></i></span>
                <span id="mode-browser"><i class="fa-solid fa-desktop"></i></span>
            </div>
            <button class="btn-ico" onclick="tg('om')" id="btn-output"><i class="fa-solid fa-headphones"></i></button>
            <button class="btn-ico" onclick="toggleQuickMenu()" id="btn-menu"><i class="fa-solid fa-ellipsis-vertical"></i></button>
        </div>
        <!-- Quick Menu -->
        <div id="quick-menu" class="quick-menu">
            <div class="menu-grid">
                <button class="btn-ico" id="btn-xf" onclick="toggleCrossfeed()" style="position:relative;"><i class="fa-solid fa-globe"></i><span id="xf-dot" class="dot" style="background:#ff00ff;display:none;"></span></button>
                <button class="btn-ico" id="btn-bp" onclick="toggleBitPerfect()" style="position:relative;"><i class="fa-solid fa-microchip"></i><span id="bp-dot" class="dot" style="background:var(--accent);display:none;"></span></button>
                <button class="btn-ico" id="btn-timer" onclick="tg('tm')" style="position:relative;"><i class="fa-solid fa-stopwatch"></i><span id="timer-badge" class="badge-dot" style="display:none;"></span></button>
                <button class="btn-ico" onclick="toggleLyrics()" id="btn-lyrics"><i class="fa-solid fa-microphone-lines"></i></button>
                <button class="btn-ico" onclick="openLibrary()"><i class="fa-solid fa-list-ul"></i></button>
            </div>
        </div>
    </div>

    <!-- Vinyl + Info -->
    <div class="dashboard">
        <div class="disc-wrap">
            <div class="disc" id="discArea">
                <img id="cover-img" src="/static/img/default.png" alt="" class="cover" onerror="this.src='/static/img/default.png'">
            </div>
        </div>
        <div class="info-area">
            <h2 id="tit">Ready</h2>
            <h3 id="art">OwrtBox Player</h3>
            <div class="meta-row">
                <span id="genre" class="badge" style="display:none;">Genre</span>
                <span id="year" class="badge" style="display:none;">Year</span>
            </div>
            <div class="tech-info" id="tech-specs">AWAITING SIGNAL</div>
        </div>
    </div>

    <!-- Seek -->
    <div class="seek-box">
        <span class="t-time" id="t-cur">0:00</span>
        <input type="range" id="pb" min="0" max="100" value="0">
        <span class="t-time" id="t-tot">0:00</span>
    </div>

    <!-- Mini Queue -->
    <div id="mini-queue" style="display:none;width:100%;flex-shrink:0;padding:2px 0;max-height:48px;overflow:hidden;">
        <div id="mini-queue-list" style="display:flex;flex-direction:column;gap:2px;"></div>
    </div>

    <!-- Controls -->
    <div class="ctl-row">
        <button class="ctl sm" id="btn-shuf" onclick="ctl('shuffle')"><i class="fa-solid fa-shuffle"></i></button>
        <button class="ctl" onclick="ctl('prev')"><i class="fa-solid fa-backward-step"></i></button>
        <button class="ctl play-btn" id="btn-play" onclick="togglePlay()"><i class="fa-solid fa-play" id="pi"></i></button>
        <button class="ctl" onclick="ctl('next')"><i class="fa-solid fa-forward-step"></i></button>
        <button class="ctl sm" id="btn-loop" onclick="ctl('loop')"><i class="fa-solid fa-repeat"></i></button>
    </div>

    <!-- EQ + Volume + Balance -->
    <div class="eq-section" id="eq-section">
        <div class="eq-header" onclick="toggleEq()">
            <span>EQUALIZER</span>
            <button class="preset-link" onclick="event.stopPropagation();tg('pr-om')"><span id="cur-preset-txt">PRESETS</span> <i class="fa-solid fa-chevron-down"></i></button>
        </div>
        <div class="eq-grid">
            <div class="knob-wrap"><div class="knob sm" id="k-f1" data-type="f1"></div><label>Sub</label></div>
            <div class="knob-wrap"><div class="knob sm" id="k-f2" data-type="f2"></div><label>Low</label></div>
            <div class="knob-wrap"><div class="knob sm" id="k-f3" data-type="f3"></div><label>Kick</label></div>
            <div class="knob-wrap"><div class="knob sm" id="k-f4" data-type="f4"></div><label>Mid</label></div>
            <div class="knob-wrap"><div class="knob sm" id="k-f5" data-type="f5"></div><label>Body</label></div>
            <div class="knob-wrap"><div class="knob sm" id="k-f6" data-type="f6"></div><label>Vox</label></div>
            <div class="knob-wrap"><div class="knob sm" id="k-f7" data-type="f7"></div><label>Detl</label></div>
            <div class="knob-wrap"><div class="knob sm" id="k-f8" data-type="f8"></div><label>Pres</label></div>
            <div class="knob-wrap"><div class="knob sm" id="k-f9" data-type="f9"></div><label>Treb</label></div>
            <div class="knob-wrap"><div class="knob sm" id="k-f10" data-type="f10"></div><label>Air</label></div>
        </div>
        <div class="vol-bal-row">
            <div class="vol-section">
                <div class="knob lg" id="k-vol" data-type="vol"></div>
                <span id="v-vol-val">50%</span>
            </div>
            <div class="bal-section">
                <span>L</span>
                <input type="range" id="balanceSlider" min="-100" max="100" value="0" step="5">
                <span>R</span>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="search-row">
        <form onsubmit="searchYt(event)" class="search-form">
            <input id="searchInput" class="search-input" placeholder="Search or paste URL..." autocomplete="off">
            <button type="submit" class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </form>
    </div>
</div>

<!-- Media Center -->
<div id="pm" class="overlay">
    <div class="overlay-hdr"><span>Media Center</span><button onclick="tg('pm')" class="close-btn">&times;</button></div>
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('files')" id="tab-files">FILES</button>
        <button class="tab-btn" onclick="switchTab('saved')" id="tab-saved">SAVED</button>
        <button class="tab-btn" onclick="switchTab('queue')" id="tab-queue">QUEUE</button>
    </div>
    <div id="content-files" class="tab-content active">
        <div class="toolbar">
            <button onclick="scanLibrary()" class="tb-btn primary"><i class="fa-solid fa-sync"></i> RESCAN</button>
            <button onclick="document.getElementById('upload-input').click()" class="tb-btn"><i class="fa-solid fa-upload"></i> UPLOAD</button>
            <input type="file" id="upload-input" accept=".mp3,.flac,.wav,.m4a,.ogg,.opus,.wma,.aac" style="display:none" multiple onchange="uploadFiles(event)">
            <div class="path-display"><i class="fa-solid fa-search"></i><input id="lib-search" placeholder="Filter..." oninput="filterLibraryLocal(this.value)"></div>
        </div>
        <div id="scan-status" style="font-size:0.65rem;color:var(--dim);text-align:center;">Ready</div>
        <div id="lib-list" class="scroll-list"></div>
    </div>
    <div id="content-saved" class="tab-content">
        <div class="search-form" style="margin-bottom:8px;">
            <input id="pl-name" class="search-input" placeholder="Name" style="border-radius:0;">
            <input id="pl-url" class="search-input" placeholder="URL" style="border-radius:0;border-left:none;">
            <button onclick="addPl()" class="search-btn" style="width:auto;padding:0 12px;"><i class="fa-solid fa-plus"></i></button>
        </div>
        <div id="pl-list" class="scroll-list"></div>
    </div>
    <div id="content-queue" class="tab-content">
        <div class="toolbar">
            <span style="font-size:0.65rem;color:var(--dim);font-weight:600;">PLAYING NEXT</span>
            <button onclick="exportM3U()" class="tb-btn"><i class="fa-solid fa-download"></i></button>
            <button onclick="document.getElementById('m3u-input').click()" class="tb-btn"><i class="fa-solid fa-upload"></i></button>
            <input type="file" id="m3u-input" accept=".m3u,.m3u8,.pls" style="display:none" onchange="importM3U(event)">
            <button onclick="clearQueue()" class="tb-btn" style="color:#ff4444;">Clear</button>
        </div>
        <div id="queue-list" class="scroll-list"></div>
    </div>
</div>

<!-- Output Popup -->
<div id="om" class="popup">
    <div class="popup-box">
        <div class="overlay-hdr"><span>Audio Output</span><button onclick="tg('om')" class="close-btn">&times;</button></div>
        <div style="padding:12px;">
            <div class="menu-item" onclick="manualOut('jack')"><i class="fa-solid fa-headphones"></i><span>Line Out (Jack)</span></div>
            <div class="menu-item" onclick="manualOut('hdmi')"><i class="fa-solid fa-tv"></i><span>HDMI Audio</span></div>
            <div class="menu-item" onclick="openBt()"><i class="fa-brands fa-bluetooth-b"></i><span>Bluetooth</span></div>
            <div id="bt-panel" style="display:none;margin-top:8px;">
                <button onclick="scanBt()" class="tb-btn" style="width:100%;margin-bottom:4px;">SCAN DEVICES</button>
                <div id="bt-list" class="scroll-list" style="height:100px;"></div>
                <div id="bt-status" style="font-size:0.6rem;color:var(--accent);text-align:center;"></div>
            </div>
        </div>
    </div>
</div>

<!-- Timer Popup -->
<div id="tm" class="popup">
    <div class="popup-box">
        <div class="overlay-hdr"><span>Sleep Timer</span><button onclick="tg('tm')" class="close-btn">&times;</button></div>
        <div style="padding:12px;display:flex;gap:8px;flex-wrap:wrap;">
            <button onclick="setTimer(15)" class="timer-btn"><i class="fa-regular fa-clock"></i> 15m</button>
            <button onclick="setTimer(30)" class="timer-btn"><i class="fa-solid fa-clock"></i> 30m</button>
            <button onclick="setTimer(60)" class="timer-btn"><i class="fa-solid fa-hourglass-half"></i> 1h</button>
            <button onclick="setTimer(0)" class="timer-btn" style="border-color:#ff4444;color:#ff4444;"><i class="fa-solid fa-ban"></i> Off</button>
        </div>
    </div>
</div>

<!-- Presets Popup -->
<div id="pr-om" class="popup">
    <div class="popup-box">
        <div class="overlay-hdr"><span>EQ Presets</span><button onclick="tg('pr-om')" class="close-btn">&times;</button></div>
        <div id="preset-container" class="preset-grid"></div>
    </div>
</div>

<!-- Lyrics -->
<div id="lym" class="overlay" style="background:rgba(5,5,10,0.95);">
    <div class="overlay-hdr" style="border:none;"><span>Lyrics</span><button onclick="toggleLyrics()" class="close-btn">&times;</button></div>
    <div id="lyrics-container" class="lyrics-scroll"><div style="margin-top:40px;color:#666;">Play a song</div></div>
</div>

<!-- Search Popup -->
<div id="search-popup" class="popup-bottom">
    <div class="popup-box" style="border-radius:20px 20px 0 0;max-width:100%;">
        <div class="overlay-hdr"><span>Results</span><button onclick="closeSearch()" class="close-btn">&times;</button></div>
        <div id="popup-content" class="scroll-list" style="max-height:55vh;"></div>
    </div>
</div>

<script src="/static/js/script.js?v=4"></script>
<script>if('serviceWorker'in navigator){navigator.serviceWorker.register('/static/sw.js').catch(()=>{});}</script>
</body>
</html>
